<svg viewBox="0 0 850 420" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <style>
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    @keyframes pulseGlow { 0%, 100% { opacity: 0.25; stroke-width: 1.5; } 50% { opacity: 0.55; stroke-width: 2.5; } }
    @keyframes pulseGlow2 { 0%, 100% { opacity: 0.1; stroke-width: 1; } 50% { opacity: 0.3; stroke-width: 2; } }
    @keyframes scanline { 0% { transform: translateY(-10px); } 100% { transform: translateY(420px); } }
    @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-4px); } }
    @keyframes particleDrift { 0% { opacity: 0; transform: translate(0, 0); } 20% { opacity: 0.5; } 80% { opacity: 0.3; } 100% { opacity: 0; transform: translate(-12px, -20px); } }
    @keyframes particleDrift2 { 0% { opacity: 0; transform: translate(0, 0); } 20% { opacity: 0.4; } 80% { opacity: 0.2; } 100% { opacity: 0; transform: translate(10px, -25px); } }
    @keyframes flicker { 0%, 95%, 100% { opacity: 1; } 96% { opacity: 0.6; } 98% { opacity: 0.5; } }
    .terminal-bg { fill: #0d1117; }
    .terminal-bar { fill: #161b22; }
    .bar-title { fill: #8b949e; font-family: 'Courier New', monospace; font-size: 13px; }
    .prompt { fill: #7B2FBE; font-family: 'Courier New', monospace; font-size: 14px; font-weight: bold; }
    .command { fill: #00e5ff; font-family: 'Courier New', monospace; font-size: 14px; }
    .key { fill: #00e5ff; font-family: 'Courier New', monospace; font-size: 13px; font-weight: bold; }
    .value { fill: #c9d1d9; font-family: 'Courier New', monospace; font-size: 13px; }
    .sep { fill: #30363d; font-family: 'Courier New', monospace; font-size: 13px; }
    .cursor { animation: blink 1s step-end infinite; fill: #00e5ff; }
    .scanline { fill: rgba(0,229,255,0.03); animation: scanline 4s linear infinite; }
    .accent { fill: #7B2FBE; }
    .avatar-group { animation: float 6s ease-in-out infinite; }
    .glow-ring { fill: none; stroke: #00e5ff; animation: pulseGlow 3s ease-in-out infinite; }
    .glow-ring2 { fill: none; stroke: #00e5ff; animation: pulseGlow2 3.5s ease-in-out infinite 0.5s; }
    .particle { fill: #00e5ff; }
    .p1 { animation: particleDrift 3.2s ease-out infinite; }
    .p2 { animation: particleDrift2 3.8s ease-out infinite 0.8s; }
    .p3 { animation: particleDrift 4.2s ease-out infinite 1.5s; }
    .p4 { animation: particleDrift2 3.5s ease-out infinite 2.2s; }
    .p5 { animation: particleDrift 3.6s ease-out infinite 0.4s; }
    .p6 { animation: particleDrift2 4s ease-out infinite 1.8s; }
    .code-text { fill: #00e5ff; font-family: 'Courier New', monospace; font-size: 8px; opacity: 0.08; }
  </style>
  <defs>
    <clipPath id="avatar-clip"><circle cx="150" cy="195" r="110"/></clipPath>
  </defs>
  <rect class="terminal-bg" width="850" height="420" rx="10" ry="10"/>
  <rect class="terminal-bar" width="850" height="36" rx="10" ry="10"/>
  <rect class="terminal-bar" y="20" width="850" height="16"/>
  <circle fill="#ff5f57" cx="22" cy="18" r="6"/>
  <circle fill="#febc2e" cx="42" cy="18" r="6"/>
  <circle fill="#28c840" cx="62" cy="18" r="6"/>
  <text class="bar-title" x="425" y="22" text-anchor="middle">alterax@github — neofetch</text>
  <rect class="scanline" x="0" y="0" width="850" height="4"/>
  <g style="animation: flicker 10s ease-in-out infinite;">
    <text class="code-text" x="38" y="68">01001100</text>
    <text class="code-text" x="248" y="82">0x4C</text>
    <text class="code-text" x="45" y="328">&lt;/&gt;</text>
    <text class="code-text" x="252" y="308">{ }</text>
  </g>
  <g class="avatar-group">
    <circle class="glow-ring2" cx="150" cy="195" r="120"/>
    <circle class="glow-ring" cx="150" cy="195" r="113"/>
    <image x="40" y="85" width="220" height="220" clip-path="url(#avatar-clip)" href="data:image/jpeg;base64," preserveAspectRatio="xMidYMid slice"/>
    <circle class="particle p1" cx="55" cy="135" r="1.3"/>
    <circle class="particle p2" cx="245" cy="155" r="1"/>
    <circle class="particle p3" cx="75" cy="265" r="1.1"/>
    <circle class="particle p4" cx="235" cy="245" r="0.9"/>
    <circle class="particle p5" cx="95" cy="95" r="1.2"/>
    <circle class="particle p6" cx="215" cy="105" r="1"/>
    <circle class="particle p2" cx="50" cy="205" r="0.7"/>
    <circle class="particle p4" cx="250" cy="195" r="0.8"/>
  </g>
  <line x1="300" y1="60" x2="300" y2="315" stroke="#30363d" stroke-width="1" stroke-dasharray="4,4"/>
  <g transform="translate(320, 55)">
    <text class="key" x="0" y="20" style="font-size:15px; fill:#7B2FBE;">alterax-code</text>
    <text class="value" x="115" y="20" style="font-size:15px;">@github</text>
    <line x1="0" y1="30" x2="500" y2="30" stroke="#30363d" stroke-width="1"/>
    <text class="key" x="0" y="55">Name</text><text class="sep" x="95" y="55">:</text><text class="value" x="110" y="55">Lucas Jacob</text>
    <text class="key" x="0" y="78">Age</text><text class="sep" x="95" y="78">:</text><text class="value" x="110" y="78">28</text>
    <text class="key" x="0" y="101">School</text><text class="sep" x="95" y="101">:</text><text class="value" x="110" y="101">EPITECH Paris</text>
    <text class="key" x="0" y="124">Degree</text><text class="sep" x="95" y="124">:</text><text class="value" x="110" y="124">Master Data Science</text>
    <text class="key" x="0" y="147">Location</text><text class="sep" x="95" y="147">:</text><text class="value" x="110" y="147">Paris, France</text>
    <text class="key" x="0" y="170">Status</text><text class="sep" x="95" y="170">:</text><text class="value" x="110" y="170">Open for alternance</text>
    <text class="key" x="0" y="193">Portfolio</text><text class="sep" x="95" y="193">:</text><text class="value" x="110" y="193">lucas-jacob.com</text>
    <text class="key" x="0" y="216">Editor</text><text class="sep" x="95" y="216">:</text><text class="value" x="110" y="216">VS Code / Neovim</text>
    <text class="key" x="0" y="239">Languages</text><text class="sep" x="95" y="239">:</text><text class="value" x="110" y="239">Python, JS/TS, Rust, Java, PHP</text>
    <text class="key" x="0" y="262">Skills</text><text class="sep" x="95" y="262">:</text><text class="value" x="110" y="262">Data, AI, Full-Stack, DevOps</text>
  </g>
  <g transform="translate(320, 325)">
    <rect fill="#00e5ff" x="0" y="0" width="50" height="16" rx="2"/>
    <rect fill="#7B2FBE" x="55" y="0" width="50" height="16" rx="2"/>
    <rect fill="#00b4d8" x="110" y="0" width="50" height="16" rx="2"/>
    <rect fill="#4361ee" x="165" y="0" width="50" height="16" rx="2"/>
    <rect x="220" y="0" width="50" height="16" rx="2" fill="#0d1117" stroke="#30363d"/>
    <rect x="275" y="0" width="50" height="16" rx="2" fill="#161b22" stroke="#30363d"/>
    <rect x="330" y="0" width="50" height="16" rx="2" fill="#30363d"/>
    <rect x="385" y="0" width="50" height="16" rx="2" fill="#8b949e"/>
  </g>
  <g transform="translate(30, 370)">
    <text class="prompt" x="0" y="20">alterax</text>
    <text class="sep" x="55" y="20">@</text>
    <text class="accent" x="65" y="20">~</text>
    <text class="value" x="80" y="20">$</text>
    <text class="command" x="95" y="20">echo "Atypical path. Relentless grind."</text>
    <rect class="cursor" x="465" y="8" width="8" height="16"/>
  </g>
</svg>