<svg viewBox="0 0 850 410" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    @keyframes glow {
      0%, 100% { filter: drop-shadow(0 0 2px #00e5ff); }
      50% { filter: drop-shadow(0 0 8px #00e5ff); }
    }
    @keyframes scanline {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(410px); }
    }
    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
    @keyframes glitch1 {
      0%, 90%, 100% { transform: translate(0); }
      92% { transform: translate(-2px, 1px); }
      94% { transform: translate(2px, -1px); }
      96% { transform: translate(-1px, 2px); }
      98% { transform: translate(1px, -2px); }
    }
    .terminal-bg { fill: #0d1117; }
    .terminal-bar { fill: #161b22; }
    .dot-red { fill: #ff5f57; }
    .dot-yellow { fill: #febc2e; }
    .dot-green { fill: #28c840; }
    .bar-title { fill: #8b949e; font-family: 'Courier New', monospace; font-size: 13px; }
    .prompt { fill: #7B2FBE; font-family: 'Courier New', monospace; font-size: 14px; font-weight: bold; }
    .command { fill: #00e5ff; font-family: 'Courier New', monospace; font-size: 14px; }
    .key { fill: #00e5ff; font-family: 'Courier New', monospace; font-size: 13px; font-weight: bold; }
    .value { fill: #c9d1d9; font-family: 'Courier New', monospace; font-size: 13px; }
    .separator { fill: #30363d; font-family: 'Courier New', monospace; font-size: 13px; }
    .ascii { fill: #00e5ff; font-family: 'Courier New', monospace; font-size: 11px; animation: glow 3s ease-in-out infinite; }
    .cursor { animation: blink 1s step-end infinite; fill: #00e5ff; }
    .scanline { fill: rgba(0,229,255,0.03); animation: scanline 4s linear infinite; }
    .info-group { animation: fadeIn 1s ease-out forwards; }
    .glitch { animation: glitch1 5s ease-in-out infinite; }
    .bar-fill-cyan { fill: #00e5ff; }
    .bar-fill-purple { fill: #7B2FBE; }
    .bar-fill-teal { fill: #00b4d8; }
    .bar-fill-blue { fill: #4361ee; }
    .accent { fill: #7B2FBE; }
  </style>

  <!-- Terminal window -->
  <rect class="terminal-bg" width="850" height="410" rx="10" ry="10"/>
  
  <!-- Title bar -->
  <rect class="terminal-bar" width="850" height="36" rx="10" ry="10"/>
  <rect class="terminal-bar" y="20" width="850" height="16"/>
  <circle class="dot-red" cx="22" cy="18" r="6"/>
  <circle class="dot-yellow" cx="42" cy="18" r="6"/>
  <circle class="dot-green" cx="62" cy="18" r="6"/>
  <text class="bar-title" x="425" y="22" text-anchor="middle">alterax@github — neofetch</text>

  <!-- Scanline effect -->
  <rect class="scanline" x="0" y="0" width="850" height="4" rx="0"/>

  <!-- ASCII Art - Reaper (left side) -->
  <g class="glitch" transform="translate(30, 55)">
    <text class="ascii" x="0" y="20">        ████████</text>
    <text class="ascii" x="0" y="33">      ██░░░░░░░░██</text>
    <text class="ascii" x="0" y="46">    ██░░░░░░░░░░░░░░██</text>
    <text class="ascii" x="0" y="59">   ██░░░░░░░░░░░░░░░░██</text>
    <text class="ascii" x="0" y="72">  ██░░░░░░████░░░░░░██</text>
    <text class="ascii" x="0" y="85">  ██░░░░████▓▓▓▓████░░░░██</text>
    <text class="ascii" x="0" y="98">  ██░░██▓▓▓▓▓▓▓▓██░░██</text>
    <text class="ascii" x="0" y="111">  ██░░██  ▓▓▓▓  ██░░██</text>
    <text class="ascii" x="0" y="124">  ██░░██▓▓▓▓▓▓▓▓██░░██</text>
    <text class="ascii" x="0" y="137">   ██░░██▓▓▓▓▓▓██░░██</text>
    <text class="ascii" x="0" y="150">    ██░░████████░░██</text>
    <text class="ascii" x="0" y="163">   ██░░░░░░░░░░░░░░░░██</text>
    <text class="ascii" x="0" y="176">  ██░░░░░░░░░░░░░░░░░░██</text>
    <text class="ascii" x="0" y="189"> ██░░░░░░░░░░░░░░░░░░░░██</text>
    <text class="ascii" x="0" y="202"> ██░░░░░░░░░░░░░░░░░░░░██</text>
    <text class="ascii" x="0" y="215"> ██░░░░░░░░░░░░░░░░░░░░██</text>
    <text class="ascii" x="0" y="228">  ██░░░░░░░░░░░░░░░░░░██</text>
    <text class="ascii" x="0" y="241">   ████░░░░░░░░░░████</text>
    <text class="ascii" x="0" y="254">       ██████████</text>
  </g>

  <!-- Separator line -->
  <line x1="295" y1="65" x2="295" y2="310" stroke="#30363d" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Info section (right side) -->
  <g class="info-group" transform="translate(315, 55)">
    <!-- Header -->
    <text class="key" x="0" y="20" style="font-size:15px; fill:#7B2FBE;">alterax-code</text>
    <text class="value" x="115" y="20" style="font-size:15px;">@github</text>
    <line x1="0" y1="30" x2="500" y2="30" stroke="#30363d" stroke-width="1"/>

    <!-- Info rows -->
    <text class="key" x="0" y="55">Name</text>
    <text class="separator" x="95" y="55">:</text>
    <text class="value" x="110" y="55">Lucas Jacob</text>

    <text class="key" x="0" y="78">Age</text>
    <text class="separator" x="95" y="78">:</text>
    <text class="value" x="110" y="78">28</text>

    <text class="key" x="0" y="101">School</text>
    <text class="separator" x="95" y="101">:</text>
    <text class="value" x="110" y="101">EPITECH Paris</text>

    <text class="key" x="0" y="124">Degree</text>
    <text class="separator" x="95" y="124">:</text>
    <text class="value" x="110" y="124">Master Data Science</text>

    <text class="key" x="0" y="147">Location</text>
    <text class="separator" x="95" y="147">:</text>
    <text class="value" x="110" y="147">Paris, France</text>

    <text class="key" x="0" y="170">Status</text>
    <text class="separator" x="95" y="170">:</text>
    <text class="value" x="110" y="170">Open for alternance</text>

    <text class="key" x="0" y="193">Portfolio</text>
    <text class="separator" x="95" y="193">:</text>
    <text class="value" x="110" y="193">lucas-jacob.com</text>

    <text class="key" x="0" y="216">Editor</text>
    <text class="separator" x="95" y="216">:</text>
    <text class="value" x="110" y="216">VS Code / Neovim</text>

    <text class="key" x="0" y="239">Languages</text>
    <text class="separator" x="95" y="239">:</text>
    <text class="value" x="110" y="239">Python, JS/TS, Rust, Java, PHP</text>

    <text class="key" x="0" y="262">Skills</text>
    <text class="separator" x="95" y="262">:</text>
    <text class="value" x="110" y="262">Data, AI, Full-Stack, DevOps</text>
  </g>

  <!-- Color bar palette at bottom -->
  <g transform="translate(315, 325)">
    <rect class="bar-fill-cyan" x="0" y="0" width="50" height="16" rx="2"/>
    <rect class="bar-fill-purple" x="55" y="0" width="50" height="16" rx="2"/>
    <rect class="bar-fill-teal" x="110" y="0" width="50" height="16" rx="2"/>
    <rect class="bar-fill-blue" x="165" y="0" width="50" height="16" rx="2"/>
    <rect x="220" y="0" width="50" height="16" rx="2" fill="#0d1117" stroke="#30363d"/>
    <rect x="275" y="0" width="50" height="16" rx="2" fill="#161b22" stroke="#30363d"/>
    <rect x="330" y="0" width="50" height="16" rx="2" fill="#30363d"/>
    <rect x="385" y="0" width="50" height="16" rx="2" fill="#8b949e"/>
  </g>

  <!-- Bottom prompt — single line, no pastry -->
  <g transform="translate(30, 370)">
    <text class="prompt" x="0" y="20">alterax</text>
    <text class="separator" x="55" y="20">@</text>
    <text class="accent" x="65" y="20">~</text>
    <text class="value" x="80" y="20">$</text>
    <text class="command" x="95" y="20">echo "Atypical path. Relentless grind."</text>
    <rect class="cursor" x="465" y="8" width="8" height="16"/>
  </g>
</svg>
